<style>
:root {
  /* Drapeau gabonais */
  --gab-vert:  #009A44;
  --gab-jaune: #FCD116;
  --gab-bleu:  #003893;

  /* Palette éditoriale */
  --foret:     #061a0e;
  --foret2:    #0d2b18;
  --foret3:    #174d2a;
  --or:        #c9963a;
  --or2:       #e8b84b;
  --or-pale:   #f5e4b0;
  --sable:     #f5ede0;
  --sable2:    #ece2ce;
  --ivoire:    #faf7f1;
  --encre:     #131a15;
  --muted:     #6b7a6e;
  --intl:      #0f2d5c;
  --intl2:     #1e4f99;
  --intl-bg:   #eef4fc;
  --white:     #ffffff;
  --r:         8px;
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;scroll-behavior:smooth;}

body {
  font-family:'DM Sans',sans-serif;
  background:var(--sable);
  color:var(--encre);
  min-height:100vh;
}

/* ── BARRE PROGRESSION ── */
#prog{
  position:fixed;top:0;left:0;height:3px;width:0;
  background:linear-gradient(to right,var(--gab-vert),var(--gab-jaune),var(--gab-bleu));
  z-index:9999;transition:width .4s ease;opacity:0;
}

/* ════════════════════════════════════
   HEADER
════════════════════════════════════ */
.site-header{
  background:var(--foret);
  position:sticky;top:0;z-index:200;
}

/* Bande drapeau en haut */
.flag-top{
  height:6px;
  background:linear-gradient(to right,
    var(--gab-vert)  0%,   var(--gab-vert)  33.33%,
    var(--gab-jaune) 33.33%,var(--gab-jaune) 66.66%,
    var(--gab-bleu)  66.66%,var(--gab-bleu)  100%
  );
}

.h-inner{
  max-width:920px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;
  justify-content:space-between;gap:12px;
  padding-top:14px;padding-bottom:12px;
}

/* Logo + perroquet */
.logo-block{display:flex;align-items:center;gap:14px;}

/* Perroquet gris du Gabon — SVG inline */
.lighthouse-wrap{
  width:50px;height:54px;flex-shrink:0;
  background:rgba(0,56,147,0.12);
  border-radius:50%;
  border:1.5px solid rgba(0,154,68,0.25);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

  width:46px;height:46px;flex-shrink:0;
  background:rgba(201,150,58,0.08);
  border-radius:50%;
  border:1.5px solid rgba(201,150,58,0.2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}

.logo-text-block{display:flex;flex-direction:column;gap:2px;}

.logo{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(24px,5vw,40px);
  font-weight:900;
  color:var(--ivoire);
  letter-spacing:-1.5px;
  line-height:1;
}
.logo .acc{color:var(--gab-jaune);}
.logo .num{color:var(--or);font-weight:500;font-size:.7em;letter-spacing:0;}

.logo-sub{
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:2.5px;
  text-transform:uppercase;
  color:rgba(201,150,58,0.5);
}

/* Right */
.h-right{display:flex;align-items:center;gap:8px;flex-shrink:0;}

.date-lbl{
  font-family:'DM Mono',monospace;font-size:9px;
  color:rgba(255,255,255,0.28);letter-spacing:.8px;
  text-transform:uppercase;display:none;
}
@media(min-width:520px){.date-lbl{display:block;}}

.badges{display:flex;gap:5px;}
.badge{
  font-family:'DM Mono',monospace;font-size:10px;font-weight:500;
  padding:3px 9px;border-radius:20px;
}
.bg{background:rgba(201,150,58,.18);color:var(--or2);border:1px solid rgba(201,150,58,.22);}
.bi{background:rgba(30,79,153,.2);color:#85b5f0;border:1px solid rgba(30,79,153,.25);}

.btn-ref{
  display:flex;align-items:center;gap:5px;padding:6px 13px;
  background:rgba(201,150,58,.1);border:1px solid rgba(201,150,58,.2);
  border-radius:20px;color:var(--or-pale);
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  cursor:pointer;transition:background .2s;white-space:nowrap;
}
.btn-ref:hover{background:rgba(201,150,58,.2);}
.btn-ref:disabled{opacity:.4;cursor:not-allowed;}

.spinner{
  width:10px;height:10px;
  border:1.5px solid rgba(201,150,58,.3);
  border-top-color:var(--or);
  border-radius:50%;animation:spin .7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ════════════════════════════════════
   ONGLETS DE NAVIGATION — GRANDS
════════════════════════════════════ */
.nav{
  background:var(--foret2);
  border-bottom:1px solid rgba(255,255,255,.04);
}

.nav-top{
  max-width:920px;margin:0 auto;padding:0 20px;
  display:flex;align-items:stretch;gap:2px;
}

/* Onglets larges et bien visibles */
.vtab{
  flex:1;
  display:flex;align-items:center;justify-content:center;
  gap:8px;
  padding:16px 10px;
  font-size:clamp(12px,2.5vw,16px);
  font-weight:700;
  letter-spacing:.3px;
  text-transform:none;
  color:rgba(255,255,255,.35);
  background:none;border:none;
  border-bottom:4px solid transparent;
  cursor:pointer;
  transition:all .2s;
  white-space:nowrap;
}
.vtab:hover{
  background:rgba(255,255,255,.04);
  color:rgba(255,255,255,.65);
}
.vtab .tab-icon{font-size:1.2em;}
.vtab .tab-lbl{font-weight:700;}

/* Onglet Gabon actif */
.vtab.tg.on{
  color:var(--gab-jaune);
  border-bottom-color:var(--gab-vert);
  background:rgba(0,154,68,.08);
}
/* Onglet International actif */
.vtab.ti.on{
  color:#85b5f0;
  border-bottom-color:var(--gab-bleu);
  background:rgba(0,56,147,.08);
}
/* Onglet Tout actif */
.vtab.ta.on{
  color:#ddd;
  border-bottom-color:#666;
  background:rgba(255,255,255,.04);
}
.vtab.tp.on{
  color:var(--gab-jaune);
  border-bottom-color:var(--or);
  background:rgba(201,150,58,.1);
}

/* Indicateur actif sous les onglets */
.nav-indicator{
  height:3px;
  background:linear-gradient(to right,var(--gab-vert),var(--gab-jaune),var(--gab-bleu));
  opacity:.3;
}

/* Chips de filtre source */
.chips-bar{
  background:var(--sable2);
  border-bottom:2px solid var(--sable2);
  border-top:1px solid #d8cdb8;
}
.chips-inner{
  max-width:920px;margin:0 auto;padding:0 20px;
  display:flex;align-items:center;gap:6px;
  overflow-x:auto;scrollbar-width:none;
  padding-top:9px;padding-bottom:9px;
}
.chips-inner::-webkit-scrollbar{display:none;}

.chip{
  flex-shrink:0;
  padding:5px 14px;border-radius:20px;
  font-size:11px;font-weight:600;
  cursor:pointer;
  border:1.5px solid #c4b89e;
  color:#5a4e3a;
  background:var(--ivoire);
  transition:all .15s;white-space:nowrap;
}
.chip:hover{border-color:var(--or);color:var(--foret);background:white;}
.chip.cg.on{background:var(--foret);border-color:var(--foret);color:var(--gab-jaune);}
.chip.ci.on{background:var(--intl2);border-color:var(--intl2);color:white;}

/* ════════════════════════════════════
   CONTENU PRINCIPAL
════════════════════════════════════ */
.main{
  max-width:920px;margin:0 auto;
  padding:28px 20px 90px;
}

/* En-tête de section */
.sec-head{
  display:flex;align-items:center;gap:10px;
  margin-bottom:20px;
}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sdot.g{background:var(--gab-vert);}
.sdot.i{background:var(--intl2);}
.slbl{
  font-family:'DM Mono',monospace;font-size:10px;
  letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);
}
.srule{flex:1;height:1px;}
.srule.g{background:linear-gradient(to right,rgba(0,154,68,.3),transparent);}
.srule.i{background:linear-gradient(to right,rgba(30,79,153,.3),transparent);}
.sn{font-family:'DM Mono',monospace;font-size:10px;padding:2px 8px;border-radius:10px;}
.sn.g{background:rgba(0,154,68,.1);color:var(--gab-vert);}
.sn.i{background:rgba(30,79,153,.1);color:var(--intl2);}

/* ════════════════════════════════════
   CARTE ARTICLE
════════════════════════════════════ */
.card{
  background:var(--white);
  border-radius:var(--r);
  border:1px solid var(--sable2);
  margin-bottom:16px;overflow:hidden;
  animation:rise .4s ease both;
  transition:box-shadow .25s,transform .25s;
}
.card:hover{
  box-shadow:0 8px 28px rgba(6,26,14,.1);
  transform:translateY(-2px);
}
.card.intl{border-color:#d8e7f7;background:#fafcff;}

@keyframes rise{
  from{opacity:0;transform:translateY(16px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Barre colorée haut de carte */
.cbar{height:4px;}
.cbar.g{
  background:linear-gradient(to right,var(--gab-vert),var(--gab-jaune));
}
.cbar.i{
  background:linear-gradient(to right,var(--intl),var(--intl2));
}

/* Méta */
.cmeta{
  display:flex;align-items:center;
  justify-content:space-between;padding:10px 16px 0;
}
.csrc{
  font-family:'DM Mono',monospace;font-size:9px;
  letter-spacing:1.5px;text-transform:uppercase;font-weight:500;
}
.csrc.g{color:var(--foret3);}
.csrc.i{color:var(--intl2);}
.intl-tag{
  background:var(--intl2);color:white;
  font-size:8px;font-weight:700;
  padding:1px 6px;border-radius:8px;
  letter-spacing:.5px;margin-right:5px;
}
.ctime{font-family:'DM Mono',monospace;font-size:9px;color:#c8c8c8;}

/* Titre éditorial */
.ctitle{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(19px,3.2vw,25px);
  font-weight:700;line-height:1.25;
  color:var(--foret);
  padding:10px 16px 0;
  letter-spacing:-.3px;
}
.card.intl .ctitle{color:var(--intl);}

/* Résumé */
.csum{
  margin:10px 16px;
  padding:12px 14px;
  border-radius:6px;
  font-size:13.5px;
  line-height:1.8;
  color:#2a2a2a;
}
.csum.g{
  background:linear-gradient(135deg,#fdf9f0,#f9f3e4);
  border-left:3px solid var(--gab-vert);
}
.csum.i{
  background:linear-gradient(135deg,#f0f5fc,#e8f0fa);
  border-left:3px solid var(--intl2);
  color:#1e2d3d;
}

.csum-lbl{
  display:flex;align-items:center;gap:5px;
  font-family:'DM Mono',monospace;
  font-size:8px;letter-spacing:2px;
  text-transform:uppercase;margin-bottom:6px;
}
.csum.g .csum-lbl{color:var(--gab-vert);}
.csum.i .csum-lbl{color:var(--intl2);}
.csum-lbl::before{
  content:'';width:5px;height:5px;
  border-radius:50%;background:currentColor;
  display:inline-block;
}

/* Pied de carte */
.cfoot{
  display:flex;align-items:center;
  justify-content:space-between;
  padding:10px 16px 12px;
  border-top:1px solid #f0ece3;
}
.card.intl .cfoot{border-top-color:#e4edf7;}

.ccat{
  font-size:10px;font-weight:500;
  padding:3px 10px;border-radius:20px;
  background:var(--sable2);color:var(--muted);
}

.cread{
  font-size:11px;font-weight:600;
  background:none;border:none;cursor:pointer;
  display:flex;align-items:center;
  gap:4px;letter-spacing:.3px;padding:4px 0;
  transition:gap .15s;
}
.cread:hover{gap:7px;}
.cread.g{color:var(--foret3);}
.cread.i{color:var(--intl2);}

/* ════════════════════════════════════
   PAGINATION
════════════════════════════════════ */
.pages{
  display:flex;align-items:center;
  justify-content:center;gap:6px;
  margin-top:32px;flex-wrap:wrap;
}
.pgbtn{
  min-width:38px;height:38px;
  padding:0 10px;border-radius:6px;
  border:1px solid var(--sable2);
  background:var(--white);
  color:var(--muted);
  font-size:13px;font-weight:500;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .15s;
}
.pgbtn:hover:not(:disabled){border-color:var(--gab-vert);color:var(--gab-vert);}
.pgbtn.on{
  background:var(--foret);
  border-color:var(--foret);
  color:var(--gab-jaune);
  font-weight:700;
}
.pgbtn:disabled{opacity:.3;cursor:not-allowed;}

.pg-info{
  font-family:'DM Mono',monospace;
  font-size:10px;color:var(--muted);
  text-align:center;margin-top:10px;
}

/* ════════════════════════════════════
   ÉTATS
════════════════════════════════════ */
.state{text-align:center;padding:70px 20px;color:var(--muted);}
.state-ico{font-size:50px;margin-bottom:16px;opacity:.45;animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:.45}50%{opacity:.15}}
.state h3{font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--foret);margin-bottom:8px;}
.state p{font-size:13px;line-height:1.6;}

.skel{
  background:var(--white);border-radius:var(--r);
  border:1px solid var(--sable2);
  padding:16px;margin-bottom:16px;
}
.sk{
  background:linear-gradient(90deg,#ede8df 25%,#e3ddd3 50%,#ede8df 75%);
  background-size:200% 100%;
  animation:shimmer 1.3s infinite;border-radius:4px;
}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* ════════════════════════════════════
   TOAST
════════════════════════════════════ */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--foret);color:var(--or-pale);
  border:1px solid rgba(201,150,58,.3);
  padding:9px 18px;border-radius:30px;
  font-size:12px;font-weight:500;
  z-index:800;transition:transform .3s ease;
  white-space:nowrap;
}
#toast.show{transform:translateX(-50%) translateY(0);}

/* Bande drapeau bas de page */
.foot-flag{
  position:fixed;bottom:0;left:0;right:0;height:5px;
  background:linear-gradient(to right,
    var(--gab-vert)  0%,   var(--gab-vert)  33.33%,
    var(--gab-jaune) 33.33%,var(--gab-jaune) 66.66%,
    var(--gab-bleu)  66.66%,var(--gab-bleu)  100%
  );
  z-index:100;
}

/* ════════════════════════════════════
   CARTE ÉDITORIALE — Gabon Phare
════════════════════════════════════ */
.card.editorial {
  border:none;
  border-left: 4px solid var(--or);
  background: linear-gradient(135deg, var(--ivoire), #fdf8ee);
  box-shadow: 0 4px 20px rgba(14,34,24,0.08);
}

.card-editorial-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px 0;
}

.editorial-badge {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  background: var(--foret);
  color: var(--or2);
  padding: 3px 10px;
  border-radius: 3px;
}

.editorial-date {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}

.card-editorial-img {
  width: 100%;
  max-height: 280px;
  object-fit: cover;
  margin: 12px 0 0;
  display: block;
}

.card-editorial-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(22px, 4vw, 30px);
  font-weight: 900;
  line-height: 1.2;
  color: var(--foret);
  padding: 14px 16px 0;
  letter-spacing: -0.5px;
}

.card-editorial-content {
  font-size: 14px;
  line-height: 1.85;
  color: #2a2a2a;
  padding: 12px 16px;
  white-space: pre-line;
}

.card-editorial-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px 14px;
  border-top: 1px solid rgba(201,150,58,0.2);
}

.editorial-cat {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  background: rgba(201,150,58,0.1);
  color: var(--or);
}

/* ════════════════════════════════════
   RÉCAP HEBDOMADAIRE — style éditorial
════════════════════════════════════ */
.recap-section {
  background: var(--foret);
  border-radius: var(--r);
  margin-bottom: 24px;
  overflow: hidden;
  border: 1px solid var(--foret3);
  box-shadow: 0 4px 20px rgba(6,26,14,0.15);
}

.recap-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 22px;
  background: linear-gradient(135deg, var(--foret2), var(--foret));
  border-bottom: 2px solid var(--or);
  cursor: pointer;
  user-select: none;
}

.recap-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--or);
  background: rgba(201,150,58,0.1);
  border: 1px solid rgba(201,150,58,0.25);
  padding: 3px 10px;
  border-radius: 3px;
  flex-shrink: 0;
}

.recap-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px;
  font-weight: 700;
  color: var(--ivoire);
  flex: 1;
  letter-spacing: -0.3px;
}

.recap-date {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.8px;
  text-transform: uppercase;
}

.recap-toggle {
  color: rgba(201,150,58,0.5);
  font-size: 14px;
  transition: transform 0.2s;
  flex-shrink: 0;
}
.recap-toggle.open { transform: rotate(180deg); }

.recap-body {
  padding: 24px 28px;
  display: none;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.recap-body.open { display: block; }

.recap-text {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.9;
  color: rgba(255,255,255,0.78);
  white-space: pre-line;
  font-weight: 300;
}

/* Signature de la rédaction */
.recap-signature {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.08);
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  color: rgba(201,150,58,0.45);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.recap-fb-badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: rgba(24,119,242,0.15);
  border: 1px solid rgba(24,119,242,0.25);
  color: rgba(122,172,238,0.7);
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  padding: 3px 9px;
  border-radius: 3px;
  letter-spacing: 0.5px;
}

/* ════════════════════════════════════
   RESPONSIVE
════════════════════════════════════ */
@media(max-width:520px){
  .h-inner,.main{padding-left:14px;padding-right:14px;}
  .nav-top{padding-left:14px;padding-right:14px;}
  .chips-inner{padding-left:14px;padding-right:14px;}
  .ctitle{font-size:19px;}
  .csum{font-size:13px;}
  .vtab{padding:13px 6px;font-size:13px;}
  .lighthouse-wrap{
  width:50px;height:54px;flex-shrink:0;
  background:rgba(0,56,147,0.12);
  border-radius:50%;
  border:1.5px solid rgba(0,154,68,0.25);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
width:38px;height:38px;}
}
</style>
</head>
<body>

<div id="prog"></div>

<!-- ══ HEADER ══════════════════════════════════════ -->
<header class="site-header">
  <div class="flag-top"></div>
  <div class="h-inner">

    <!-- Logo Gabon Phare -->
    <div class="logo-block">
      <div class="lighthouse-wrap">
        <!-- Phare avec drapeau gabonais vert-jaune-bleu -->
        <svg width="36" height="40" viewBox="0 0 80 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Rayons de lumière -->
          <line x1="40" y1="12" x2="10" y2="2"  stroke="#FCD116" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
          <line x1="40" y1="12" x2="5"  y2="18" stroke="#FCD116" stroke-width="2"   stroke-linecap="round" opacity="0.5"/>
          <line x1="40" y1="12" x2="70" y2="2"  stroke="#FCD116" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
          <line x1="40" y1="12" x2="75" y2="18" stroke="#FCD116" stroke-width="2"   stroke-linecap="round" opacity="0.5"/>
          <line x1="40" y1="12" x2="40" y2="1"  stroke="#FCD116" stroke-width="3"   stroke-linecap="round" opacity="1"/>
          <!-- Halo lumineux -->
          <circle cx="40" cy="14" r="9" fill="#FCD116" opacity="0.2"/>
          <!-- Lanterne -->
          <circle cx="40" cy="14" r="6" fill="#FCD116"/>
          <circle cx="40" cy="14" r="3.5" fill="white"/>
          <!-- Toit -->
          <path d="M27 23 L40 13 L53 23 Z" fill="#1a1a1a"/>
          <!-- Galerie -->
          <rect x="25" y="23" width="30" height="4" rx="1" fill="#444"/>
          <!-- Corps phare — 3 bandes drapeau Gabon -->
          <rect x="29" y="27" width="22" height="13" rx="0" fill="#009A44"/>
          <rect x="29" y="40" width="22" height="13" rx="0" fill="#FCD116"/>
          <rect x="29" y="53" width="22" height="13" rx="1" fill="#003893"/>
          <!-- Fenêtres -->
          <ellipse cx="40" cy="33" rx="3.5" ry="4" fill="rgba(255,255,255,0.45)"/>
          <ellipse cx="40" cy="46" rx="3.5" ry="4" fill="rgba(255,255,255,0.35)"/>
          <ellipse cx="40" cy="59" rx="3.5" ry="4" fill="rgba(255,255,255,0.25)"/>
          <!-- Base -->
          <rect x="23" y="66" width="34" height="7" rx="2" fill="#2a2a2a"/>
          <!-- Mer stylisée -->
          <path d="M8 80 Q20 76 40 79 Q60 82 72 77 L72 88 L8 88 Z" fill="#003893" opacity="0.35"/>
          <path d="M8 81 Q22 77 40 80 Q58 83 72 78" stroke="#FCD116" stroke-width="1.5" fill="none" opacity="0.6" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="logo-text-block">
        <div class="logo">Gabon<span class="acc"> Phare</span></div>
        <div class="logo-sub">L'actualité gabonaise en lumière</div>
      </div>
    </div>

    <div class="h-right">
      <div class="date-lbl" id="cur-date">—</div>
      <div class="badges">
        <span class="badge bg" id="cnt-g" title="Articles gabonais">—</span>
        <span class="badge bi" id="cnt-i" title="Articles internationaux">—</span>
      </div>
      <button class="btn-ref" id="btn-ref" onclick="doRefresh()" title="Forcer l'actualisation des articles">
        <span id="ri">↻</span> Actualiser
      </button>
    </div>

  </div>
</header>

<!-- ══ ONGLETS GRANDS ══════════════════════════════ -->
<nav class="nav">
  <div class="nav-top">
    <button class="vtab tg on" onclick="setView('gabon',this)">
      <span class="tab-icon">🇬🇦</span>
      <span class="tab-lbl">Gabon</span>
    </button>
    <button class="vtab ti" onclick="setView('international',this)">
      <span class="tab-icon">🌍</span>
      <span class="tab-lbl">International</span>
    </button>
    <button class="vtab ta" onclick="setView('all',this)">
      <span class="tab-icon">⚡</span>
      <span class="tab-lbl">Tout</span>
    </button>
    <button class="vtab tp" onclick="setView('editorial',this)">
      <span class="tab-icon">✍️</span>
      <span class="tab-lbl">Gabon Phare</span>
    </button>
  </div>
  <div class="nav-indicator"></div>
</nav>

<!-- Chips sources -->
<div class="chips-bar">
  <div class="chips-inner" id="chips"></div>
</div>

<!-- ══ CONTENU ══════════════════════════════════════ -->
<div class="main" id="recap-wrap" style="display:none; padding-bottom:0;">
  <div class="recap-section" id="recap-section">
    <div class="recap-header" onclick="toggleRecap()">
      <span class="recap-label">Édition hebdo</span>
      <span class="recap-title">Revue de la semaine au Gabon</span>
      <span class="recap-date" id="recap-date">—</span>
      <span class="recap-toggle" id="recap-toggle">▼</span>
    </div>
    <div class="recap-body" id="recap-body">
      <div class="recap-text" id="recap-text">Chargement...</div>
      <div class="recap-signature">
        <span>Gabon Phare · Rédaction</span>
        <span class="recap-fb-badge">Publié sur Facebook · Dimanche 16h30</span>
      </div>
    </div>
  </div>
</div>

<main class="main" id="main"></main>

<div class="foot-flag"></div>
<div id="toast"></div>

<script>
const BACKEND       = 'https://capitalk241-backend.onrender.com/news';
const BACKEND_RECAP = 'https://capitalk241-backend.onrender.com/recap'; // à mettre à jour si Render change
const PER_PAGE = 10;

let view='gabon', src='all', page=1, busy=false;
let data={gabon:[],international:[],editorial:[],all:[]};

const GSRC=[
  {id:'gabonmediatime',label:'Gabon Media Time'},
  {id:'gabonreview',   label:'Gabon Review'},
  {id:'gabonactu',     label:'Gabon Actu'},
];
const ISRC=[
  {id:'rfi',             label:'RFI'},
  {id:'france24',        label:'France 24'},
  {id:'jeuneafrique',    label:'Jeune Afrique'},
  {id:'bbc_afrique',     label:'BBC Afrique'},
  {id:'lemonde_afrique', label:'Le Monde'},
  {id:'brut_afrique',    label:'Brut'},
];

document.getElementById('cur-date').textContent=
  new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();

function prog(p){
  const b=document.getElementById('prog');
  b.style.width=p+'%';
  b.style.opacity=(p>0&&p<100)?'1':'0';
}

function toast(msg,ms=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),ms);
}

async function fetchData(manual=false){
  if(busy)return;
  busy=true;
  const btn=document.getElementById('btn-ref');
  btn.disabled=true;
  document.getElementById('ri').outerHTML=
    '<span id="ri"><span class="spinner"></span></span>';
  prog(20);showSkels();prog(55);

  try{
    const r=await fetch(BACKEND);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const json=await r.json();
    data.gabon        =json.articles.filter(a=>a.source_type==='gabon' && !a.manual && a.source_id!=='gabon_phare_editorial');
    data.international=json.articles.filter(a=>a.source_type==='international');
    data.editorial    =json.articles.filter(a=>a.manual===true || a.source_id==='gabon_phare_editorial');
    data.all          =json.articles;
    document.getElementById('cnt-g').textContent=data.gabon.length + data.editorial.length;
    document.getElementById('cnt-i').textContent=data.international.length;
    prog(100);
    if(manual)toast('✓ '+data.all.length+' articles chargés');
  }catch(e){
    prog(0);
    if(manual)toast('⚠ Serveur inaccessible');
  }

  document.getElementById('ri').outerHTML='<span id="ri">↻</span>';
  btn.disabled=false;busy=false;
  page=1;renderChips();render();
}

function doRefresh(){fetchData(true);}

function showSkels(){
  document.getElementById('main').innerHTML=Array(4).fill(0).map(()=>`
    <div class="skel">
      <div class="sk" style="height:4px;margin-bottom:14px;border-radius:2px"></div>
      <div class="sk" style="height:9px;width:28%;margin-bottom:14px"></div>
      <div class="sk" style="height:28px;width:90%;margin-bottom:6px"></div>
      <div class="sk" style="height:28px;width:65%;margin-bottom:14px"></div>
      <div class="sk" style="height:80px;margin-bottom:12px"></div>
      <div class="sk" style="height:9px;width:35%"></div>
    </div>`).join('');
}

function setView(v,btn){
  view=v;src='all';page=1;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderChips();render();
}

function renderChips(){
  const wrap=document.getElementById('chips');
  if(view==='editorial'){
    const el = document.createElement('span');
    el.textContent = 'Articles rédigés par la rédaction Gabon Phare';
    el.style.cssText = 'font-size:10px;color:rgba(201,150,58,.45);padding:4px 0;';
    wrap.innerHTML = '';
    wrap.appendChild(el);
    return;
  }
  const srcs=view==='gabon'?GSRC:view==='international'?ISRC:[...GSRC,...ISRC];
  const t=view==='international'?'ci':'cg';
  wrap.innerHTML=
    `<button class="chip ${t} ${src==='all'?'on':''}" onclick="setSrc('all')">Tous</button>`+
    srcs.map(s=>`<button class="chip ${t} ${src===s.id?'on':''}" onclick="setSrc('${s.id}')">${s.label}</button>`).join('');
}

function setSrc(id){src=id;page=1;renderChips();render();}

function render(){
  const main=document.getElementById('main');
  let arts;
  if(view==='editorial'){
    arts=data.editorial||[];
  } else {
    arts=view==='all'?data.all:(data[view]||[]);
  }
  if(src!=='all')arts=arts.filter(a=>a.source_id===src);

  if(!arts.length){
    main.innerHTML=`<div class="state">
      <div class="state-ico">📭</div>
      <h3>Aucun article disponible</h3>
      <p>Aucun contenu pour ce filtre.<br>Réessaie dans quelques minutes.</p>
    </div>`;
    return;
  }

  const total=arts.length;
  const nPg=Math.ceil(total/PER_PAGE);
  page=Math.min(page,nPg);
  const slice=arts.slice((page-1)*PER_PAGE,page*PER_PAGE);

  if(view==='all'){
    const gab =slice.filter(a=>a.source_type==='gabon');
    const intl=slice.filter(a=>a.source_type==='international');
    main.innerHTML=
      (gab.length ?secBlock('g','🇬🇦 Presse gabonaise',gab)      :'')+
      (intl.length?secBlock('i','🌍 Regards internationaux',intl):'') +
      pgBlock(page,nPg,total);
  }else{
    main.innerHTML=slice.map((a,i)=>cardHtml(a,i)).join('')+pgBlock(page,nPg,total);
  }

  window.scrollTo({top:0,behavior:'smooth'});
}

function secBlock(t,lbl,arts){
  return `
    <div class="sec-head">
      <span class="sdot ${t}"></span>
      <span class="slbl">${lbl}</span>
      <span class="sn ${t}">${arts.length}</span>
      <div class="srule ${t}"></div>
    </div>
    ${arts.map((a,i)=>cardHtml(a,i)).join('')}`;
}

function cardEditorial(a,i){
  const delay = i*0.05;
  const img = a.image_url
    ? `<img class="card-editorial-img" src="${a.image_url}" alt="${a.title}" onerror="this.style.display='none'">`
    : '';
  const date = a.time_ago || 'À l\'instant';
  const cat  = a.category || 'Éditorial';
  // Affiche le contenu complet (pas juste le résumé)
  const body = a.content || a.ai_summary || '';

  return `
  <div class="card editorial" style="animation-delay:${delay}s">
    <div class="card-editorial-header">
      <span class="editorial-badge">✍ Gabon Phare</span>
      <span class="editorial-date">${date}</span>
    </div>
    ${img}
    <div class="card-editorial-title">${a.title}</div>
    <div class="card-editorial-content">${body}</div>
    <div class="card-editorial-footer">
      <span class="editorial-cat">${cat}</span>
    </div>
  </div>`;
}

function cardHtml(a,i){
  // Article éditorial Gabon Phare — affichage spécial
  if(a.manual || a.source_id==='gabon_phare_editorial'){
    return cardEditorial(a,i);
  }
  const isI=a.source_type==='international';
  const t=isI?'i':'g';
  const url=(a.url||'#').replace(/'/g,'%27');
  let sum=a.ai_summary||'—';
  ['Résumé :','Résumé:','# Résumé','**Résumé**'].forEach(p=>{
    if(sum.startsWith(p))sum=sum.slice(p.length).trim();
  });
  return `
  <div class="card ${isI?'intl':''}" style="animation-delay:${i*.05}s">
    <div class="cbar ${t}"></div>
    <div class="cmeta">
      <span class="csrc ${t}">${isI?'<span class="intl-tag">INTL</span>':''}${a.source_name}</span>
      <span class="ctime">${a.time_ago||a.time||'Récent'}</span>
    </div>
    <div class="ctitle">${a.title}</div>
    <div class="csum ${t}">
      <div class="csum-lbl">Résumé Gabon Phare</div>
      ${sum}
    </div>
    <div class="cfoot">
      <span class="ccat">${a.category||'Actualité'}</span>
      <button class="cread ${t}" onclick="window.open('${url}','_blank')">Lire l'article →</button>
    </div>
  </div>`;
}

function pgBlock(cur,total,artTotal){
  if(total<=1)return'';
  let nums=new Set([1,total]);
  for(let p=Math.max(1,cur-2);p<=Math.min(total,cur+2);p++)nums.add(p);
  nums=[...nums].sort((a,b)=>a-b);
  let btns='',prev=0;
  for(const n of nums){
    if(prev&&n-prev>1)btns+=`<span class="pgbtn" style="cursor:default;color:#ccc;border-color:transparent">…</span>`;
    btns+=`<button class="pgbtn ${n===cur?'on':''}" onclick="goPage(${n})">${n}</button>`;
    prev=n;
  }
  const s=(cur-1)*PER_PAGE+1,e=Math.min(cur*PER_PAGE,artTotal);
  return `
    <div class="pages">
      <button class="pgbtn" onclick="goPage(${cur-1})" ${cur===1?'disabled':''}>‹</button>
      ${btns}
      <button class="pgbtn" onclick="goPage(${cur+1})" ${cur===total?'disabled':''}>›</button>
    </div>
    <p class="pg-info">Articles ${s}–${e} sur ${artTotal}</p>`;
}

function goPage(p){page=p;render();}

setInterval(()=>fetchData(false),60*60*1000);
setInterval(()=>fetchRecap(),60*60*1000);  // rafraîchit le récap toutes les heures

// ══ RÉCAP HEBDOMADAIRE ══════════════════════════════
async function fetchRecap() {
  try {
    const r    = await fetch(BACKEND_RECAP);
    const json = await r.json();

    if (!json.available) return;

    // Affiche la section
    document.getElementById('recap-wrap').style.display = 'block';

    // Date de génération
    if (json.generated_at) {
      const d = new Date(json.generated_at);
      document.getElementById('recap-date').textContent =
        d.toLocaleDateString('fr-FR', {weekday:'long', day:'numeric', month:'long'}).toUpperCase();
    }

    // Texte du récap
    document.getElementById('recap-text').textContent = json.recap;

  } catch(e) {
    console.warn('Récap non disponible:', e.message);
  }
}

function toggleRecap() {
  const body    = document.getElementById('recap-body');
  const toggle  = document.getElementById('recap-toggle');
  const isOpen  = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  toggle.classList.toggle('open', !isOpen);
}

renderChips();
fetchData(false);   // chargement automatique au démarrage
fetchRecap();       // charge le récap s'il existe
</script>
</body>
</html>
