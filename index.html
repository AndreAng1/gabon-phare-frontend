<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CapiTalk241 — L'essentiel du Gabon</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;0,900;1,400;1,600&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════
   PALETTE GABON
   Forêt équatoriale + or okoumé
   + sable des plages de l'Estuaire
════════════════════════════ */
:root {
  --foret:     #0e2218;
  --foret2:    #163322;
  --foret3:    #1f4530;
  --or:        #c9963a;
  --or2:       #e8b84b;
  --or-pale:   #f5dfa0;
  --sable:     #f4ede0;
  --sable2:    #ede3d0;
  --ivoire:    #faf7f1;
  --encre:     #1a1a1a;
  --muted:     #7a8a7e;
  --rouge:     #b33a1a;
  --intl:      #1e3f6e;
  --intl2:     #2d5c9e;
  --intl-bg:   #eef4fc;
  --white:     #ffffff;
  --radius:    8px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { font-size:16px; scroll-behavior:smooth; }

body {
  font-family:'DM Sans',sans-serif;
  background: var(--sable);
  color: var(--encre);
  min-height:100vh;
  background-image:
    radial-gradient(ellipse at 15% 0%,   rgba(201,150,58,0.07) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%, rgba(14,34,24,0.05)   0%,transparent 55%);
}

/* Barre de progression */
#prog {
  position:fixed; top:0; left:0; height:3px; width:0;
  background:linear-gradient(to right, var(--foret3), var(--or), var(--or2));
  z-index:9999; transition:width 0.4s ease;
  border-radius:0 2px 2px 0; opacity:0;
}

/* ════════════════════════════
   HEADER
════════════════════════════ */
.site-header {
  background:var(--foret);
  border-bottom:4px solid var(--or);
  position:sticky; top:0; z-index:200;
}

.h-inner {
  max-width:900px; margin:0 auto; padding:0 20px;
}

.h-top {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:16px 0 12px; gap:12px;
}

/* Logo */
.logo-wrap { display:flex; flex-direction:column; gap:3px; }

.logo {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(26px,6vw,42px);
  font-weight:900;
  color:var(--ivoire);
  letter-spacing:-1.5px;
  line-height:1;
}
.logo .acc { color:var(--or2); }
.logo .n241 {
  color:var(--or);
  font-weight:500;
  font-size:0.72em;
  letter-spacing:0;
}

.logo-sub {
  font-family:'DM Mono',monospace;
  font-size:8px;
  letter-spacing:3px;
  text-transform:uppercase;
  color:rgba(201,150,58,0.55);
}

/* Right side */
.h-right {
  display:flex; align-items:center;
  gap:8px; flex-shrink:0;
}

.date-lbl {
  font-family:'DM Mono',monospace;
  font-size:9px;
  color:rgba(255,255,255,0.3);
  letter-spacing:1px;
  text-transform:uppercase;
  display:none;
}
@media(min-width:540px){ .date-lbl { display:block; } }

.badges { display:flex; gap:5px; }
.badge {
  font-family:'DM Mono',monospace;
  font-size:10px; font-weight:500;
  padding:3px 9px; border-radius:20px;
}
.bg  { background:rgba(201,150,58,0.2); color:var(--or2); border:1px solid rgba(201,150,58,0.25); }
.bi  { background:rgba(45,92,158,0.2);  color:#7aacee;    border:1px solid rgba(45,92,158,0.25); }

.btn-ref {
  display:flex; align-items:center; gap:5px;
  padding:6px 12px;
  background:rgba(201,150,58,0.1);
  border:1px solid rgba(201,150,58,0.22);
  border-radius:20px;
  color:var(--or-pale);
  font-family:'DM Sans',sans-serif;
  font-size:11px; font-weight:500;
  cursor:pointer;
  transition:background 0.2s;
  white-space:nowrap;
}
.btn-ref:hover   { background:rgba(201,150,58,0.2); }
.btn-ref:disabled{ opacity:0.4; cursor:not-allowed; }

.spinner {
  width:10px; height:10px;
  border:1.5px solid rgba(201,150,58,0.3);
  border-top-color:var(--or);
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Bande drapeau Gabon */
.flag-strip {
  height:5px;
  background:linear-gradient(
    to right,
    var(--foret3) 0%,    var(--foret3) 33.33%,
    var(--or)     33.33%,var(--or)     66.66%,
    #2255cc       66.66%,#2255cc       100%
  );
  opacity:0.6;
}

/* ════════════════════════════
   NAV TABS + CHIPS
════════════════════════════ */
.nav {
  background:var(--foret2);
  border-bottom:1px solid rgba(255,255,255,0.04);
  overflow-x:auto; scrollbar-width:none;
}
.nav::-webkit-scrollbar { display:none; }

.nav-inner {
  max-width:900px; margin:0 auto; padding:0 20px;
  display:flex; align-items:center;
  gap:0; min-width:max-content;
}

.vtab {
  padding:11px 16px;
  font-size:11px; font-weight:600;
  letter-spacing:0.8px; text-transform:uppercase;
  color:rgba(255,255,255,0.32);
  background:none; border:none;
  border-bottom:3px solid transparent;
  cursor:pointer; white-space:nowrap;
  transition:all 0.2s;
}
.vtab:hover { color:rgba(255,255,255,0.55); }
.vtab.ag.on { color:var(--or2);  border-bottom-color:var(--or); }
.vtab.ai.on { color:#7aacee;     border-bottom-color:var(--intl2); }
.vtab.aa.on { color:#bbb;        border-bottom-color:#555; }

.ndiv { width:1px; height:18px; background:rgba(255,255,255,0.07); margin:0 4px; flex-shrink:0; }

.chips-row {
  display:flex; gap:5px; padding:6px 0;
  overflow-x:auto; scrollbar-width:none;
}
.chips-row::-webkit-scrollbar { display:none; }

.chip {
  flex-shrink:0;
  padding:4px 11px; border-radius:20px;
  font-size:10px; font-weight:600;
  cursor:pointer;
  border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.32);
  background:transparent;
  transition:all 0.15s; white-space:nowrap;
}
.chip:hover { border-color:rgba(255,255,255,0.2); color:rgba(255,255,255,0.5); }
.chip.cg.on { background:var(--or);   border-color:var(--or);   color:var(--foret); }
.chip.ci.on { background:var(--intl2);border-color:var(--intl2);color:white; }

/* ════════════════════════════
   CONTENU
════════════════════════════ */
.main {
  max-width:900px; margin:0 auto;
  padding:28px 20px 80px;
}

/* Section header */
.sec-head {
  display:flex; align-items:center;
  gap:10px; margin-bottom:20px;
}
.sdot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.sdot.g { background:var(--or); }
.sdot.i { background:var(--intl2); }
.slbl {
  font-family:'DM Mono',monospace;
  font-size:10px; letter-spacing:2.5px;
  text-transform:uppercase; color:var(--muted);
}
.srule { flex:1; height:1px; }
.srule.g { background:linear-gradient(to right,rgba(201,150,58,0.3),transparent); }
.srule.i { background:linear-gradient(to right,rgba(45,92,158,0.3),transparent); }
.sn {
  font-family:'DM Mono',monospace;
  font-size:10px; padding:2px 8px; border-radius:10px;
}
.sn.g { background:rgba(201,150,58,0.1); color:var(--or); }
.sn.i { background:rgba(45,92,158,0.1);  color:var(--intl2); }

/* ════════════════════════════
   CARTE ARTICLE
════════════════════════════ */
.card {
  background:var(--white);
  border-radius:var(--radius);
  border:1px solid var(--sable2);
  margin-bottom:16px; overflow:hidden;
  animation:rise 0.4s ease both;
  transition:box-shadow 0.25s, transform 0.25s;
}
.card:hover {
  box-shadow:0 8px 30px rgba(14,34,24,0.1);
  transform:translateY(-2px);
}
.card.intl { border-color:#dce8f5; background:#fafcff; }

@keyframes rise {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Bande couleur haut de carte */
.cstripe { height:4px; }
.cstripe.g { background:linear-gradient(to right,var(--foret3),var(--or)); }
.cstripe.i { background:linear-gradient(to right,var(--intl),var(--intl2)); }

/* Méta */
.cmeta {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:10px 16px 0;
}
.csrc {
  font-family:'DM Mono',monospace;
  font-size:9px; letter-spacing:1.5px;
  text-transform:uppercase; font-weight:500;
}
.csrc.g { color:var(--foret3); }
.csrc.i { color:var(--intl2); }

.intl-pill {
  background:var(--intl2); color:white;
  font-size:8px; font-weight:700;
  padding:1px 6px; border-radius:8px;
  letter-spacing:0.5px; margin-right:5px;
}

.ctime {
  font-family:'DM Mono',monospace;
  font-size:9px; color:#ccc;
}

/* Titre grand format éditorial */
.ctitle {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,3.5vw,26px);
  font-weight:700;
  line-height:1.25;
  color:var(--foret);
  padding:10px 16px 0;
  letter-spacing:-0.3px;
}
.card.intl .ctitle { color:var(--intl); }

/* Résumé */
.csum {
  margin:10px 16px;
  padding:12px 14px;
  border-radius:6px;
  font-size:13.5px;
  line-height:1.75;
  color:#2a2a2a;
}
.csum.g { background:linear-gradient(135deg,#fdf9f0,#f9f3e4); border-left:3px solid var(--or); }
.csum.i { background:linear-gradient(135deg,#f0f5fc,#e8f0fa); border-left:3px solid var(--intl2); color:#1e2d3d; }

.csum-lbl {
  display:flex; align-items:center; gap:5px;
  font-family:'DM Mono',monospace;
  font-size:8px; letter-spacing:2px;
  text-transform:uppercase; margin-bottom:6px;
}
.csum.g .csum-lbl { color:var(--or); }
.csum.i .csum-lbl { color:var(--intl2); }
.csum-lbl::before {
  content:''; width:5px; height:5px;
  border-radius:50%; background:currentColor;
  display:inline-block;
}

/* Pied de carte */
.cfoot {
  display:flex; align-items:center;
  justify-content:space-between;
  padding:10px 16px 12px;
  border-top:1px solid #f2ede4;
}
.card.intl .cfoot { border-top-color:#e4edf7; }

.ccat {
  font-size:10px; font-weight:500;
  padding:3px 10px; border-radius:20px;
  background:var(--sable2); color:var(--muted);
}

.cread {
  font-size:11px; font-weight:600;
  background:none; border:none; cursor:pointer;
  display:flex; align-items:center;
  gap:4px; letter-spacing:0.3px; padding:4px 0;
  transition:gap 0.15s;
}
.cread:hover { gap:7px; }
.cread.g { color:var(--foret3); }
.cread.i { color:var(--intl2); }

/* ════════════════════════════
   PAGINATION
════════════════════════════ */
.pages {
  display:flex; align-items:center;
  justify-content:center; gap:6px;
  margin-top:32px; flex-wrap:wrap;
}

.pgbtn {
  min-width:38px; height:38px;
  padding:0 10px; border-radius:6px;
  border:1px solid var(--sable2);
  background:var(--white);
  color:var(--muted);
  font-size:13px; font-weight:500;
  cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s;
}
.pgbtn:hover:not(:disabled) { border-color:var(--or); color:var(--or); }
.pgbtn.on { background:var(--foret); border-color:var(--foret); color:var(--or2); font-weight:700; }
.pgbtn:disabled { opacity:0.3; cursor:not-allowed; }

.pg-info {
  font-family:'DM Mono',monospace;
  font-size:10px; color:var(--muted);
  text-align:center; margin-top:10px;
}

/* ════════════════════════════
   ÉTATS
════════════════════════════ */
.state {
  text-align:center; padding:70px 20px; color:var(--muted);
}
.state-ico { font-size:50px; margin-bottom:16px; opacity:0.5; animation:pulse 2s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:.5} 50%{opacity:.15} }
.state h3 { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--foret); margin-bottom:8px; }
.state p  { font-size:13px; line-height:1.6; }

/* Skeletons */
.skel {
  background:var(--white);
  border-radius:var(--radius);
  border:1px solid var(--sable2);
  padding:16px; margin-bottom:16px;
}
.sk {
  background:linear-gradient(90deg,#ede8df 25%,#e3ddd3 50%,#ede8df 75%);
  background-size:200% 100%;
  animation:shimmer 1.3s infinite;
  border-radius:4px;
}
@keyframes shimmer { from{background-position:200% 0} to{background-position:-200% 0} }

/* ════════════════════════════
   TOAST
════════════════════════════ */
#toast {
  position:fixed; bottom:24px; left:50%;
  transform:translateX(-50%) translateY(60px);
  background:var(--foret);
  color:var(--or-pale);
  border:1px solid rgba(201,150,58,0.3);
  padding:9px 18px; border-radius:30px;
  font-size:12px; font-weight:500;
  z-index:800; transition:transform 0.3s ease;
  white-space:nowrap;
}
#toast.show { transform:translateX(-50%) translateY(0); }

/* Bande drapeau bas de page */
.foot-flag {
  position:fixed; bottom:0; left:0; right:0; height:4px;
  background:linear-gradient(
    to right,
    var(--foret3) 0%,    var(--foret3) 33.33%,
    var(--or)     33.33%,var(--or)     66.66%,
    #2255cc       66.66%,#2255cc       100%
  );
  z-index:100;
}

/* ════════════════════════════
   RESPONSIVE
════════════════════════════ */
@media(max-width:540px){
  .h-inner, .nav-inner, .main { padding-left:14px; padding-right:14px; }
  .ctitle   { font-size:19px; }
  .csum     { font-size:13px; }
}
</style>
</head>
<body>

<div id="prog"></div>

<!-- HEADER -->
<header class="site-header">
  <div class="h-inner">
    <div class="h-top">
      <div class="logo-wrap">
        <div class="logo">Capi<span class="acc">Talk</span><span class="n241">241</span></div>
        <div class="logo-sub">Ce qui est capital pour le Gabon</div>
      </div>
      <div class="h-right">
        <div class="date-lbl" id="cur-date">—</div>
        <div class="badges">
          <span class="badge bg" id="cnt-g">—</span>
          <span class="badge bi" id="cnt-i">—</span>
        </div>
        <button class="btn-ref" id="btn-ref" onclick="doRefresh()">
          <span id="ri">↻</span> Actualiser
        </button>
      </div>
    </div>
  </div>
  <div class="flag-strip"></div>
</header>

<!-- NAV -->
<nav class="nav">
  <div class="nav-inner">
    <button class="vtab ag on" onclick="setView('gabon',this)">🇬🇦 Gabon</button>
    <button class="vtab ai"    onclick="setView('international',this)">🌍 International</button>
    <button class="vtab aa"    onclick="setView('all',this)">⚡ Tout</button>
    <div class="ndiv"></div>
    <div class="chips-row" id="chips"></div>
  </div>
</nav>

<!-- CONTENU -->
<main class="main" id="main"></main>

<div class="foot-flag"></div>
<div id="toast"></div>

<script>
const BACKEND  = 'https://capitalk241-backend.onrender.com/news';
const PER_PAGE = 10;

let view      = 'gabon';
let srcFilter = 'all';
let page      = 1;
let busy      = false;
let data      = { gabon:[], international:[], all:[] };

const GSRC = [
  {id:'gabonmediatime',label:'Gabon Media Time'},
  {id:'gabonreview',   label:'Gabon Review'},
  {id:'gabonactu',     label:'Gabon Actu'},
];
const ISRC = [
  {id:'rfi',             label:'RFI'},
  {id:'france24',        label:'France 24'},
  {id:'jeuneafrique',    label:'Jeune Afrique'},
  {id:'bbc_afrique',     label:'BBC'},
  {id:'lemonde_afrique', label:'Le Monde'},
  {id:'brut_afrique',    label:'Brut'},
];

// Date
document.getElementById('cur-date').textContent =
  new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'}).toUpperCase();

// Progress
function prog(pct) {
  const b = document.getElementById('prog');
  b.style.width   = pct+'%';
  b.style.opacity = (pct>0 && pct<100) ? '1' : '0';
}

// Toast
function toast(msg, ms=3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), ms);
}

// Fetch
async function fetchData(manual=false) {
  if (busy) return;
  busy = true;
  const btn = document.getElementById('btn-ref');
  btn.disabled = true;
  document.getElementById('ri').outerHTML =
    '<span id="ri"><span class="spinner"></span></span>';
  prog(20);
  showSkels();
  prog(55);

  try {
    const r    = await fetch(BACKEND);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const json = await r.json();

    data.gabon         = json.articles.filter(a => a.source_type === 'gabon');
    data.international = json.articles.filter(a => a.source_type === 'international');
    data.all           = json.articles;

    document.getElementById('cnt-g').textContent = data.gabon.length;
    document.getElementById('cnt-i').textContent = data.international.length;

    prog(100);
    if (manual) toast('✓ ' + data.all.length + ' articles chargés');
  } catch(e) {
    prog(0);
    if (manual) toast('⚠ Serveur inaccessible');
  }

  document.getElementById('ri').outerHTML = '<span id="ri">↻</span>';
  btn.disabled = false;
  busy = false;
  page = 1;
  renderChips();
  render();
}

function doRefresh() { fetchData(true); }

// Skeletons
function showSkels() {
  document.getElementById('main').innerHTML = Array(4).fill(0).map(()=>`
    <div class="skel">
      <div class="sk" style="height:4px;margin-bottom:14px;border-radius:2px"></div>
      <div class="sk" style="height:9px;width:28%;margin-bottom:14px"></div>
      <div class="sk" style="height:28px;width:90%;margin-bottom:6px"></div>
      <div class="sk" style="height:28px;width:65%;margin-bottom:14px"></div>
      <div class="sk" style="height:82px;margin-bottom:12px"></div>
      <div class="sk" style="height:9px;width:35%"></div>
    </div>`).join('');
}

// View
function setView(v, btn) {
  view = v; srcFilter = 'all'; page = 1;
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderChips();
  render();
}

// Chips
function renderChips() {
  const wrap = document.getElementById('chips');
  const srcs = view==='gabon' ? GSRC : view==='international' ? ISRC : [...GSRC,...ISRC];
  const t    = view==='international' ? 'ci' : 'cg';
  wrap.innerHTML =
    `<button class="chip ${t} ${srcFilter==='all'?'on':''}" onclick="setSrc('all')">Tous</button>` +
    srcs.map(s=>`<button class="chip ${t} ${srcFilter===s.id?'on':''}" onclick="setSrc('${s.id}')">${s.label}</button>`).join('');
}

function setSrc(id) { srcFilter=id; page=1; renderChips(); render(); }

// Render
function render() {
  const main = document.getElementById('main');
  let arts = view==='all' ? data.all : (data[view]||[]);
  if (srcFilter!=='all') arts = arts.filter(a=>a.source_id===srcFilter);

  if (!arts.length) {
    main.innerHTML = `<div class="state">
      <div class="state-ico">📭</div>
      <h3>Aucun article disponible</h3>
      <p>Aucun contenu pour ce filtre.<br>Réessaie dans quelques minutes.</p>
    </div>`;
    return;
  }

  const total  = arts.length;
  const nPages = Math.ceil(total/PER_PAGE);
  page = Math.min(page, nPages);
  const start  = (page-1)*PER_PAGE;
  const slice  = arts.slice(start, start+PER_PAGE);

  if (view==='all') {
    const gab  = slice.filter(a=>a.source_type==='gabon');
    const intl = slice.filter(a=>a.source_type==='international');
    main.innerHTML =
      (gab.length  ? secBlock('g','🇬🇦 Presse gabonaise',gab)     : '') +
      (intl.length ? secBlock('i','🌍 Regards internationaux',intl): '') +
      pgBlock(page, nPages, total);
  } else {
    main.innerHTML = slice.map((a,i)=>cardHtml(a,i)).join('') + pgBlock(page, nPages, total);
  }

  window.scrollTo({top:0,behavior:'smooth'});
}

function secBlock(t, lbl, arts) {
  return `
    <div class="sec-head">
      <span class="sdot ${t}"></span>
      <span class="slbl">${lbl}</span>
      <span class="sn ${t}">${arts.length}</span>
      <div class="srule ${t}"></div>
    </div>
    ${arts.map((a,i)=>cardHtml(a,i)).join('')}`;
}

function cardHtml(a, i) {
  const isI = a.source_type==='international';
  const t   = isI ? 'i' : 'g';
  const url = (a.url||'#').replace(/'/g,'%27');
  return `
  <div class="card ${isI?'intl':''}" style="animation-delay:${i*0.05}s">
    <div class="cstripe ${t}"></div>
    <div class="cmeta">
      <span class="csrc ${t}">${isI?'<span class="intl-pill">INTL</span>':''}${a.source_name}</span>
      <span class="ctime">${a.time_ago||a.time||'Récent'}</span>
    </div>
    <div class="ctitle">${a.title}</div>
    <div class="csum ${t}">
      <div class="csum-lbl">Résumé CapiTalk241</div>
      ${a.ai_summary||'—'}
    </div>
    <div class="cfoot">
      <span class="ccat">${a.category||'Actualité'}</span>
      <button class="cread ${t}" onclick="window.open('${url}','_blank')">Lire l'article →</button>
    </div>
  </div>`;
}

// Pagination
function pgBlock(cur, total, artTotal) {
  if (total<=1) return '';
  let nums = new Set([1,total]);
  for (let p=Math.max(1,cur-2);p<=Math.min(total,cur+2);p++) nums.add(p);
  nums = [...nums].sort((a,b)=>a-b);
  let btns='', prev=0;
  for (const n of nums) {
    if (prev && n-prev>1) btns+=`<span class="pgbtn" style="cursor:default;color:#ccc;border-color:transparent">…</span>`;
    btns+=`<button class="pgbtn ${n===cur?'on':''}" onclick="goPage(${n})">${n}</button>`;
    prev=n;
  }
  const s=(cur-1)*PER_PAGE+1, e=Math.min(cur*PER_PAGE,artTotal);
  return `
    <div class="pages">
      <button class="pgbtn" onclick="goPage(${cur-1})" ${cur===1?'disabled':''}>‹</button>
      ${btns}
      <button class="pgbtn" onclick="goPage(${cur+1})" ${cur===total?'disabled':''}>›</button>
    </div>
    <p class="pg-info">Articles ${s}–${e} sur ${artTotal}</p>`;
}

function goPage(p) { page=p; render(); }

// Auto-refresh 60min
setInterval(()=>fetchData(false), 60*60*1000);

// Démarrage
renderChips();
fetchData(false);
</script>
